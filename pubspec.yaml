name: flutter_application_1
description: TapTalk — offline AAC communication app for learners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  crypto: ^3.0.6
  uuid: ^4.5.1
  intl: ^0.20.2
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  cloud_functions: ^6.3.1
  http: ^1.2.2
  connectivity_plus: ^6.1.4
  telephony: ^0.2.0
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
